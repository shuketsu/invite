<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пиво 🍻</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f1c40f; /* Пивной золотой */
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #0f0c1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #150f30, var(--bg));
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .icon-main {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 35px; /* Увеличили отступ, чтобы отодвинуть кнопки */
            text-align: left;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 1rem;
            color: #e0e0e0;
        }

        .info-item:last-child { margin-bottom: 0; }
        .info-item i { color: var(--primary); width: 20px; }

        .btn-container {
            display: flex;
            justify-content: space-between; /* Разнесли кнопки по краям */
            padding: 0 10px;
            position: relative;
            height: 50px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-yes {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-yes:hover { transform: scale(1.05); }

        .btn-no {
            background: var(--danger);
            color: white;
            position: absolute;
            right: 10px; /* Изначально стоит далеко справа */
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        /* Экраны фидбэка */
        .screen {
            display: none;
        }
        
        .screen-yes i { color: var(--success); font-size: 4rem; margin-bottom: 15px; }
        .screen-no i { color: var(--danger); font-size: 4rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="card" id="inviteCard">
        <div class="main-screen" id="mainScreen">
            <i class="fa-solid fa-beer-mug-empty icon-main"></i>
            <h1>План: Пиво 🍻</h1>
            
            <div class="info-box">
                <div class="info-item">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span><strong>Когда:</strong> <span id="currentDate">Сегодня</span></span>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <span><strong>Время:</strong> После 20:00</span>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span><strong>Где:</strong> Вокзал Brignole</span>
                </div>
            </div>

            <div class="btn-container">
                <button class="btn btn-yes" id="yesBtn">
                    <i class="fa-solid fa-check"></i> Да
                </button>
                <button class="btn btn-no" id="noBtn">
                    <i class="fa-solid fa-xmark"></i> Нет
                </button>
            </div>
        </div>

        <div class="screen screen-yes" id="screenYes">
            <i class="fa-solid fa-heart"></i>
            <h2>жду тебя пупсик</h2>
        </div>

        <div class="screen screen-no" id="screenNo">
            <i class="fa-solid fa-face-frown"></i>
            <h2>:(</h2>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainScreen = document.getElementById('mainScreen');
        const screenYes = document.getElementById('screenYes');
        const screenNo = document.getElementById('screenNo');
        const currentDateSpan = document.getElementById('currentDate');

        const BACKEND_URL = 'https://invite-backend-rg0w.onrender.com/api/reply'; 

        // Автоматически ставим текущую дату дня открытия
        const today = new Date();
        const options = { month: 'long', day: 'numeric', weekday: 'short' };
        currentDateSpan.innerText = today.toLocaleDateString('ru-RU', options);

        // Логика убегания кнопки "Нет"
        function moveButton() {
            const card = document.getElementById('inviteCard');
            
            // Расчет случайных координат строго внутри карточки
            const maxX = card.clientWidth - noBtn.offsetWidth - 20;
            const maxY = card.clientHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.floor(Math.random() * maxX) + 10;
            const randomY = Math.floor(Math.random() * maxY) + 10;
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // Если всё-таки умудрились нажать "Нет"
        noBtn.addEventListener('click', () => {
            mainScreen.style.display = 'none';
            screenNo.style.display = 'block';
            sendReply('Друг отказался... :(');
        });

        // Клик на "Да"
        yesBtn.addEventListener('click', () => {
            mainScreen.style.display = 'none';
            screenYes.style.display = 'block';
            sendReply('Ура! Пупсик согласен на пиво на Brignole после 20:00! 🎉');
        });

        // Функция отправки на бэкенд
        function sendReply(text) {
            fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answer: text })
            }).catch(err => console.log('Ошибка бэкенда, но клик засчитан на фронте'));
        }
    </script>
</body>
</html>
